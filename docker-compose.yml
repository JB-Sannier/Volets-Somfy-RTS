services:
  authentication-service:
    build: authentication-service
    restart: unless-stopped
    depends_on:
      - docker-database
    environment:
      DB_HOSTNAME: docker-database
      DB_PORT: 5432
      DB_USERNAME: database-user-name
      DB_PASSWORD: database-password
      DB_NAME: database
      DB_SCHEMA: users
      REFRESH_TOKEN_SIGNING_KEY: ${REFRESH_TOKEN_SIGNING_KEY}
      PORT: 3000
      HOST: authentication-service
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  somfy-shutters-service:
    build: somfy-shutters-service
    restart: unless-stopped
    depends_on:
      - docker-database
    environment:
      DB_HOSTNAME: docker-database
      DB_PORT: 5432
      DB_USERNAME: database-user-name
      DB_PASSWORD: database-password
      DB_NAME: database
      DB_SCHEMA: shutters
      PORT: 3001
      HOST: somfy-shutters-service
      SELF_API_KEY: ${SELF_API_KEY}
      SOMFY_SERVER_HOST_NAME: ${SOMFY_SERVER_HOST_NAME}
      SOMFY_SERVER_PORT: ${SOMFY_SERVER_PORT}
      SOMFY_SERVER_PASSWORD: ${SOMFY_SERVER_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  backend-service:
    build: backend-service
    restart: unless-stopped
    depends_on:
      - authentication-service
      - somfy-shutters-service
    environment:
      HOST: backend-service
      PORT: 3002
      AUTHENTICATION_SERVICE_URL: http://authentication-service:3000
      SOMFY_SHUTTERS_SERVICE_URL: http://somfy-shutters-service:3001
      SOMFY_SHUTTERS_SERVICE_API_KEY: ${SELF_API_KEY}
    ports:
      - 3002:3002
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  frontend-service:
    build: frontend
    restart: unless-stopped
    depends_on:
      - backend-service
    ports:
      - 3000:80
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  docker-database:
    build: docker-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: database-user-name
      POSTGRES_PASSWORD: database-password
      POSTGRES_DB: database
    volumes:
      - ./docker-database/data:/var/lib/postgresql:rw
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
